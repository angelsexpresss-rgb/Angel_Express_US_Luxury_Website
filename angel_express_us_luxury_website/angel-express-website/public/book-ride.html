<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book a Ride | Angel Express</title>

<link rel="stylesheet" href="style.css">

<style>

.booking-page{
max-width:800px;
margin:40px auto;
padding:20px;
}

.back-btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 22px;
border-radius:50px;
background:rgba(11,20,38,.9);
border:1px solid rgba(212,175,55,.25);
color:white;
text-decoration:none;
font-weight:700;
margin-bottom:25px;
transition:.3s;
}

.back-btn:hover{
border-color:#D4AF37;
transform:translateY(-2px);
}

.booking-card{
background:rgba(16,24,39,.82);
border:1px solid rgba(212,175,55,.25);
border-radius:24px;
padding:30px;
backdrop-filter:blur(16px);
}

.booking-title{
font-size:48px;
font-weight:900;
margin-bottom:10px;
}

.booking-subtitle{
color:#B8C1CC;
margin-bottom:40px;
}

.section-title{
font-size:28px;
font-weight:800;
color:#D4AF37;
margin-top:30px;
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
margin-top:18px;
font-weight:700;
}

input,
textarea{
width:100%;
padding:16px;
border-radius:16px;
border:1px solid rgba(212,175,55,.25);
background:#0B1426;
color:white;
font-size:16px;
margin-bottom:10px;
}

textarea{
min-height:120px;
resize:vertical;
}

.option-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.option-btn{
height:58px;
border-radius:16px;
border:1px solid rgba(212,175,55,.25);
background:#0B1426;
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.option-btn.active{
background:#D4AF37;
color:#050A14;
}

.category-grid{
display:grid;
gap:12px;
}

.category-btn{
height:60px;
border-radius:16px;
border:1px solid rgba(212,175,55,.25);
background:#0B1426;
color:white;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.category-btn.active{
background:#D4AF37;
color:#050A14;
}

.continue-btn{
margin-top:30px;
width:100%;
height:60px;
border:none;
border-radius:18px;
background:#D4AF37;
color:#050A14;
font-size:20px;
font-weight:900;
cursor:pointer;
transition:.3s;
}

.continue-btn:hover{
transform:translateY(-2px);
}

@media(max-width:768px){

.option-grid{
grid-template-columns:1fr;
}

.booking-title{
font-size:38px;
}

}

</style>

</head>
<body>

<div class="booking-page">

<a href="index.html" class="back-btn">
← Back to Home
</a>

<div class="booking-card">

<h1 class="booking-title">
Book a Ride
</h1>

<p class="booking-subtitle">
Enter your trip details. Your fare estimate will be calculated next.
</p>

<label>Pickup Address</label>
<input
type="text"
id="pickup"
placeholder="Start typing pickup address"
required

>

<label>Drop-off Address</label>
<input
type="text"
id="dropoff"
placeholder="Start typing drop-off address"
required

>

<label>Date</label> <input type="date" id="tripDate">

<label>Time</label> <input type="time" id="tripTime">

<div class="section-title">
Trip Type
</div>

<div class="option-grid">

<button
class="option-btn active"
data-type="One Way">
One Way </button>

<button
class="option-btn"
data-type="Round Trip">
Round Trip </button>

</div>

<div class="section-title">
Ride Category
</div>

<div class="category-grid">

<button
class="category-btn active"
data-category="Standard Ride">
Standard Ride </button>

<button
class="category-btn"
data-category="Airport Transfer">
Airport Transfer </button>

<button
class="category-btn"
data-category="Student Group Ride">
Student Group Ride </button>

<button
class="category-btn"
data-category="Tourist/Event Ride">
Tourist/Event Ride </button>

</div>

<div class="section-title">
Passengers & Luggage
</div>

<label>Passengers</label>
<input
type="number"
id="passengers"
value="1"
min="1"

>

<label>Luggage</label>
<input
type="number"
id="luggage"
value="0"
min="0"

>

<div class="section-title">
Extra Details
</div>

<textarea
id="notes"
placeholder="Notes e.g. flight number, pickup instructions, luggage details"
></textarea>

<label>Promo / Referral Code</label>
<input
type="text"
id="referral"
placeholder="Promo / Referral Code"

>

<button
class="continue-btn"
onclick="continueToEstimate()">
Continue to Fare Estimate </button>

</div>

</div>

<script>

let tripType = "One Way";
let rideCategory = "Standard Ride";

document.querySelectorAll(".option-btn").forEach(btn => {

btn.addEventListener("click", () => {

document
.querySelectorAll(".option-btn")
.forEach(b => b.classList.remove("active"));

btn.classList.add("active");

tripType = btn.dataset.type;

});

});

document.querySelectorAll(".category-btn").forEach(btn => {

btn.addEventListener("click", () => {

document
.querySelectorAll(".category-btn")
.forEach(b => b.classList.remove("active"));

btn.classList.add("active");

rideCategory = btn.dataset.category;

});

});

function continueToEstimate(){

const bookingData = {

pickup:
document.getElementById("pickup").value,

dropoff:
document.getElementById("dropoff").value,

date:
document.getElementById("tripDate").value,

time:
document.getElementById("tripTime").value,

tripType,

rideCategory,

passengers:
document.getElementById("passengers").value,

luggage:
document.getElementById("luggage").value,

notes:
document.getElementById("notes").value,

referral:
document.getElementById("referral").value

};

localStorage.setItem(
"angelBooking",
JSON.stringify(bookingData)
);

window.location.href =
"fare-estimate.html";

}

</script>
<!-- AI Assistant -->

<button id="chatToggle" class="chat-toggle">
  💬 AI Assistant
</button>

<div class="chatbot-box" id="chatbotBox">

  <div class="chatbot-header">
    Angel Express Assistant
  </div>

  <div class="chatbot-messages" id="chatbotMessages">
    <p>
      <strong>Angel Assistant:</strong>
      Hi! How can I help you today?
    </p>
  </div>

  <div class="chatbot-input">

    <input
      type="text"
      id="chatInput"
      placeholder="Ask about booking, pricing, routes..."
    >

    <button onclick="sendChat()">
      Send
    </button>

  </div>

</div>

<!-- Chat With Us -->

<a
href="https://wa.me/19728367910"
target="_blank"
class="whatsapp-float"
>
💬 Chat With Us
</a>
<script src="script.js"></script>
</body>
</html>
